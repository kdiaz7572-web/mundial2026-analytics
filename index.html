<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Mundial 2026 Analytics</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#080c18',
          },
          fontFamily: {
            mono: ['Fira Code', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    };
  </script>

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Bracket view (llaves) — estilos estructurales scoped a .bracket-wrap -->
  <style>
    .bracket-wrap { color: #e2e8f0; font-size: 13px; }

    /* Header + título */
    .bracket-wrap .bv-header {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 12px; margin-bottom: 14px;
    }
    .bracket-wrap .bv-title {
      font-size: 18px; font-weight: 800; color: #fff; margin: 0;
    }

    /* Banner provisional */
    .bracket-wrap .bv-banner {
      display: flex; gap: 10px; align-items: flex-start;
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.35);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 16px;
    }
    .bracket-wrap .bv-banner-icon { font-size: 16px; line-height: 1.2; }
    .bracket-wrap .bv-banner-text { display: flex; flex-direction: column; gap: 2px; }
    .bracket-wrap .bv-banner-strong { color: #fbbf24; font-weight: 700; font-size: 13px; }
    .bracket-wrap .bv-banner-note { color: #94a3b8; font-size: 12px; }

    /* Chips mejores terceros */
    .bracket-wrap .bv-thirds { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bracket-wrap .bv-thirds-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; color: #64748b;
    }
    .bracket-wrap .bv-thirds-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .bracket-wrap .bv-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 999px; padding: 3px 8px; font-size: 12px;
    }
    .bracket-wrap .bv-chip-short { font-weight: 700; color: #cbd5e1; }

    /* Contenedor scrollable horizontal (móvil) */
    .bracket-wrap .bv-scroll { overflow-x: auto; padding-bottom: 8px; }

    /* Árbol = columnas lado a lado */
    .bracket-wrap .bv-tree {
      display: flex; gap: 18px; align-items: stretch; min-width: min-content;
    }

    /* Columna por ronda */
    .bracket-wrap .bv-col {
      display: flex; flex-direction: column; min-width: 150px; flex: 0 0 auto;
    }
    .bracket-wrap .bv-col-head {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #94a3b8; text-align: center;
      padding-bottom: 8px; margin-bottom: 8px;
      border-bottom: 1px solid #334155;
    }
    .bracket-wrap .bv-col-head-final { color: #f59e0b; border-color: rgba(245,158,11,0.5); }
    /* Cuerpo: reparte cards con espacio creciente (árbol de torneo) */
    .bracket-wrap .bv-col-body {
      display: flex; flex-direction: column;
      justify-content: space-around; flex: 1; gap: 10px;
    }

    /* Card de partido */
    .bracket-wrap .bv-card {
      background: #0f172a; border: 1px solid #334155;
      border-radius: 10px; padding: 7px 9px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .bracket-wrap .bv-card-final {
      border-color: #f59e0b; background: rgba(245, 158, 11, 0.06);
      box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.25);
    }
    .bracket-wrap .bv-card-third { border-color: #475569; border-style: dashed; }
    .bracket-wrap .bv-divider { height: 1px; background: #1e293b; }

    /* Slot (fila equipo) */
    .bracket-wrap .bv-slot {
      display: flex; align-items: center; gap: 7px; min-height: 22px;
    }
    .bracket-wrap .bv-flag { font-size: 15px; line-height: 1; flex: 0 0 auto; }
    .bracket-wrap .bv-short { font-weight: 800; color: #f1f5f9; font-size: 13px; }
    .bracket-wrap .bv-name {
      color: #64748b; font-size: 12px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .bracket-wrap .bv-slot-ph { opacity: 0.65; }
    .bracket-wrap .bv-slot-ph .bv-ph-text {
      color: #64748b; font-size: 12px; font-style: italic;
      border-bottom: 1px dashed #475569; padding-bottom: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Bloque 3er puesto */
    .bracket-wrap .bv-third-block { margin-top: 18px; max-width: 230px; }
    .bracket-wrap .bv-col-head-third { color: #cbd5e1; text-align: left; }

    /* Estado vacío */
    .bracket-wrap .bv-empty {
      text-align: center; padding: 48px 20px; color: #94a3b8;
    }
    .bracket-wrap .bv-empty-icon { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.6; }
    .bracket-wrap .bv-empty-title { font-weight: 700; color: #cbd5e1; font-size: 15px; margin: 0 0 4px; }
    .bracket-wrap .bv-empty-msg { font-size: 13px; margin: 0; }

    /* Desktop: la Final queda junto al 3er puesto en una columna lógica */
    @media (min-width: 768px) {
      .bracket-wrap .bv-scroll { display: flex; align-items: flex-start; gap: 18px; }
      .bracket-wrap .bv-tree { flex: 1; }
      .bracket-wrap .bv-third-block { margin-top: 0; align-self: center; }
    }

    /* Móvil: el árbol scrollea horizontalmente; texto legible */
    @media (max-width: 767px) {
      .bracket-wrap .bv-col { min-width: 138px; }
      .bracket-wrap .bv-col-body { justify-content: flex-start; }
    }
  </style>
</head>

<body class="bg-[#080c18] text-slate-100 min-h-screen">

  <!-- ══════════════════════════════════
       HEADER / NAVEGACIÓN
  ══════════════════════════════════ -->
  <header class="app-header">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 flex items-center justify-between h-14">

      <!-- Logo -->
      <div class="flex items-center gap-3 shrink-0">
        <div class="relative w-8 h-8 flex items-center justify-center">
          <span class="text-xl leading-none">⚽</span>
          <span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span>
        </div>
        <div>
          <h1 class="text-sm font-black text-white leading-none tracking-tight">Mundial 2026</h1>
          <p class="text-[9px] text-amber-400 leading-none font-bold tracking-[0.2em] uppercase mt-0.5">Analytics Pro</p>
        </div>
      </div>

      <!-- Nav escritorio -->
      <nav class="hidden md:flex gap-0.5 flex-wrap" id="main-nav"></nav>

      <!-- Badges header -->
      <div class="flex items-center gap-2 shrink-0">
        <span id="live-count-badge"
          class="hidden animate-pulse bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full tracking-wide">
        </span>
        <span id="value-bets-badge"
          class="hidden bg-emerald-700/90 text-emerald-200 text-[10px] font-bold px-2 py-0.5 rounded-full">
        </span>
        <span id="le-status-badge"
          class="hidden bg-violet-900/80 text-violet-300 text-[10px] font-bold px-2 py-0.5 rounded-full cursor-pointer border border-violet-700/50"
          title="IA-Zak activo">
        </span>
      </div>
    </div>

    <!-- Nav móvil -->
    <div class="md:hidden flex overflow-x-auto gap-1 px-4 pb-2 scrollbar-none border-t border-slate-800/50" id="mobile-nav"></div>
  </header>

  <!-- ══════════════════════════════════
       CONTENIDO PRINCIPAL
  ══════════════════════════════════ -->
  <main class="pt-[72px] pb-12 max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12">
    <div id="app-content">
      <!-- Pantalla de carga -->
      <div class="flex items-center justify-center min-h-[60vh]">
        <div class="text-center space-y-5">
          <!-- Flags loading ring -->
          <div class="relative w-20 h-20 mx-auto">
            <div class="absolute inset-0 rounded-full border-2 border-slate-800"></div>
            <div class="absolute inset-0 rounded-full border-2 border-amber-500/30 border-t-amber-500 animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center text-3xl">⚽</div>
          </div>
          <div>
            <p class="text-white font-bold text-base">Mundial 2026 Analytics</p>
            <p class="text-slate-500 text-sm mt-1">Cargando datos del torneo…</p>
          </div>
          <div class="flex justify-center gap-1.5 text-2xl opacity-60">
            <span>🇧🇷</span><span>🇦🇷</span><span>🇫🇷</span><span>🇪🇸</span><span>🇩🇪</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ══════════════════════════════════
       MODAL (detalle de equipo / info)
  ══════════════════════════════════ -->
  <div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div id="modal-content"
      class="rounded-2xl w-full max-w-2xl p-6 relative shadow-2xl overflow-y-auto" style="max-height:90vh;">
      <button onclick="closeModal()"
        class="absolute top-4 right-4 text-slate-500 hover:text-white text-2xl leading-none transition-colors"
        aria-label="Cerrar">
        &times;
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       SCRIPTS (orden de dependencias)
  ══════════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/squads.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/data_extended.js"></script>
  <script src="js/predictive_weights.js"></script> <!-- Capa: ranking FIFA + forma 12 -->
  <script src="js/math_model.js"></script>
  <script src="js/state_manager.js"></script>
  <script src="js/referee_engine.js"></script>
  <script src="js/live_engine.js"></script>
  <script src="js/odds_engine.js"></script>
  <script src="js/picks_engine.js"></script>
  <script src="js/learning_engine.js"></script>
  <script src="js/zak_agent.js"></script>
  <script src="js/zak_knowledge.js"></script>
  <script src="js/player_engine.js"></script>
  <script src="js/chat_ui.js"></script>           <!-- Chat interface component -->
  <script src="js/learning_dashboard.js"></script> <!-- Learning metrics dashboard -->
  <script src="js/state_guard.js"></script>       <!-- Module validation & safety -->
  <script src="js/bracket_engine.js"></script>    <!-- Eliminatorias / brackets 2026 -->
  <script src="js/bracket_view.js"></script>      <!-- Render visual del árbol de llaves -->
  <script src="js/app.js"></script>
  <script src="js/db_sync.js"></script>   <!-- Vercel Postgres bridge -->
</body>
</html>
